apiVersion: v1
kind: ServiceAccount
metadata:
  name: aks-diagnose
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aks-diagnose-readonly
rules:
  - apiGroups: [""]
    resources:
      - pods
      - nodes
      - events
      - persistentvolumeclaims
      - namespaces
      - services
      - endpoints
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list"]
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aks-diagnose-readonly
subjects:
  - kind: ServiceAccount
    name: aks-diagnose
    namespace: default
roleRef:
  kind: ClusterRole
  name: aks-diagnose-readonly
  apiGroup: rbac.authorization.k8s.io